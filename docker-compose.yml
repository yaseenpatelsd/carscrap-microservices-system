
services:

  # 🔹 Eureka Service Registry
  service-registry:
    build: ./service-registry
    image: carscrapproject-service-registry
    ports:
    - "8761:8761"


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api-gateway


  # 🔹 API Gateway (ENTRY POINT)
  api-gateway:
    build: ./gateway
    image: carscrapproject-gateway
    expose:
    - "8080"
    depends_on:
      - service-registry
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka

  # 🔹 MySQL Database
  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: patel
    ports:
      - "3307:3306" 
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 🔹 Auth Service
  AUTH-SERVICE:
    build: ./AUTH-SERVICE
    image: carscrapproject-auth-service
    depends_on:
      - service-registry
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: patel
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka

  # 🔹 Email Service
  EMAIL-SERVICE:
    build: ./Email_Service
    image: carscrapproject-email-service
    depends_on:
      - service-registry
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka

  # 🔹 Car Service
  CAR-SERVICE:
    build: ./car-service
    image: carscrapproject-car-service
    depends_on:
      - service-registry
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/car_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: patel
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka

  # 🔹 Booking Service
  BOOKING-SERVICE:
    build: ./booking-service
    image: carscrapproject-booking-service
    depends_on:
      - service-registry
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/booking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: patel
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka

  # 🔹 Yard Service
  YARD-SERVICE:
    build: ./yard-service
    image: carscrapproject-yard-service
    depends_on:
      - service-registry
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/yard_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: patel
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka


 


volumes:
  mysql_data: