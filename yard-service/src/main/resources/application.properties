spring.application.name=yard-service
# ===============================
secret.Key=scrapyard-super-secret-jwt-key-which-is-more-than-64-characters-long-for-hs512-security



server.port=8085

# ===============================
# Database
# ===============================
#spring.datasource.url=jdbc:mysql://localhost:3306/yard_db
#spring.datasource.username=root
#spring.datasource.password=patel


spring.datasource.url=jdbc:mysql://mysql:3306/yard_db
spring.datasource.username=root
spring.datasource.password=patel

spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.platform=mysql
spring.jpa.hibernate.ddl-auto=update


logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=OFF

# Eureka Client
# ===============================
spring:
cloud:
loadbalancer:
cache:
enabled: true
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true



