# ===============================
# Eureka Client
# ===============================
spring:
cloud:
loadbalancer:
cache:
enabled: true
feign:
client:
config:
default:
connectTimeout: 3000
readTimeout: 5000
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
