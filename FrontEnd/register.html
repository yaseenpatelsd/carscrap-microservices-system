<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarScrapy - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="register.css">
</head>
<body>

<body class="auth-page">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card register-card p-4">

        <h2 class="text-center brand-title">Car<span>Scrapy</span></h2>
        <p class="text-center subtitle mb-4">Create your account</p>

        <form id="registerForm">

            <div class="mb-3">
                <label>Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>

          <button type="submit" class="btn w-100 register-btn">
          <span class="btn-text">Register</span>
          <span class="spinner d-none"></span>
          </button>
        </form>

        <div id="message" class="mt-3 text-center"></div>

        <p class="text-center mt-3">
            Already have an account?
            <a href="login.html" class="login-link">Login</a>
        </p>

        <p class="text-center mt-2">
            Forgot password?
            <a href="otp-request-reset.html" class="login-link">Reset</a>
        </p>

    </div>

</div>
<script defer src="script.js"></script></body>
</html>
