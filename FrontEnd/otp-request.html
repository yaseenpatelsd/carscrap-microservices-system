<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarScrapy - Request OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow register-card p-4">
        <h2 class="text-center brand-title">CarScrapy</h2>
        <p class="text-center text-muted mb-4">Request OTP</p>

        <form id="otpForm">

            <div class="mb-3">
    <label>Username</label>
    <input type="text" id="username" class="form-control" required>
</div>

<button type="submit" class="btn btn-success w-100">
    <span class="btn-text">Send OTP</span>
    <span class="spinner d-none spinner-border spinner-border-sm"></span>
</button>        </form>

        <div id="message" class="mt-3 text-center"></div>

        <p class="text-center mt-3">
            Back to <a href="login.html" class="login-link">Login</a>
        </p>

    </div>

</div>

<script src="otp.js"></script>
</body>
</html>
