<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarScrapy - Verify Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="verification.css">
</head>
<body class="auth-page">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card register-card p-4">

        <h2 class="text-center brand-title">
            Car<span>Scrapy</span>
        </h2>

        <p class="text-center subtitle mb-4">Verify your account</p>

        <form id="verifyForm">

            <div class="mb-3">
                <label>Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label>OTP</label>
                <input type="text" id="otp" class="form-control" placeholder="Enter OTP" required>
            </div>

            <!-- 🔥 upgraded button -->
            <button type="submit" class="btn w-100 register-btn">
                <span class="btn-text">Verify</span>
                <span class="spinner d-none"></span>
            </button>

        </form>

        <div id="message" class="mt-3 text-center"></div>

        <p class="text-center mt-3">
            Didn’t receive OTP?
            <a href="otp-request.html" class="login-link">Resend</a>
        </p>

    </div>

</div>

<script src="verify.js"></script>
</body>
</html>
