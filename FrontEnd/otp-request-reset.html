<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarScrapy - Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="password-reset-request.css">
</head>
<body class="auth-page">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card register-card p-4">

        <h2 class="text-center brand-title">
            Car<span>Scrapy</span>
        </h2>

        <p class="text-center subtitle mb-4">Reset your password</p>

        <form id="resetOtpForm">

            <div class="mb-3">
                <label>Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <!-- 🔥 Updated button -->
            <button type="submit" class="btn w-100 register-btn">
                <span class="btn-text">Send OTP</span>
                <span class="spinner d-none"></span>
            </button>

        </form>

        <div id="message" class="mt-3 text-center"></div>

        <p class="text-center mt-3">
            Remember password?
            <a href="login.html" class="login-link">Login</a>
        </p>

    </div>

</div>

<script src="reset-otp.js"></script>
</body>
</html>
