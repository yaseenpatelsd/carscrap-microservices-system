<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarScrapy - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="password-reset.css">
</head>
<body class="auth-page">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card register-card p-4">

        <h2 class="text-center brand-title">Car<span>Scrapy</span></h2>
        <p class="text-center subtitle mb-4">Reset your password</p>

        <form id="resetForm">

            <!-- USERNAME + OTP BUTTON -->
            <div class="mb-3">
                <label>Username</label>

                <div class="otp-group">
                    <input type="text" id="username" class="form-control" required>

                    <button type="button" id="sendOtpBtn" class="otp-btn">
                        Send OTP
                    </button>
                </div>
            </div>

            <!-- OTP -->
            <div class="mb-3">
                <label>OTP</label>
                <input type="text" id="otp" class="form-control" placeholder="Enter 6-digit OTP" required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
                <label>New Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter new password" required>
            </div>

            <!-- RESET BUTTON -->
            <button type="submit" id="resetBtn" class="btn w-100 register-btn">
                <span class="btn-text">Reset Password</span>
                <span class="spinner d-none"></span>
            </button>

        </form>

        <div id="message" class="mt-3 text-center"></div>

        <p class="text-center mt-3">
            Back to <a href="login.html" class="login-link">Login</a>
        </p>

    </div>

</div>

<script src="reset.js"></script>
</body>
</html>
